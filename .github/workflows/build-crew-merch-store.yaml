name: Build crew-merch-store

on:
  push:
    branches: [main]
    paths:
      - "python/crew-ai/crew-mech-store/**"
  workflow_dispatch:

env:
  IMAGE: salaboy/crew-merch-store
  CONTEXT_DIR: python/crew-ai/crew-mech-store

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read current version
        id: version
        run: |
          CURRENT=$(cat "${{ env.CONTEXT_DIR }}/VERSION" | tr -d '[:space:]')
          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.new }}
            ${{ env.IMAGE }}:latest

      - name: Update VERSION file
        run: |
          echo "${{ steps.version.outputs.new }}" > "${{ env.CONTEXT_DIR }}/VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.CONTEXT_DIR }}/VERSION"
          git commit -m "release crew-merch-store v${{ steps.version.outputs.new }}"
          git push
